<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verb Flashcards</title>
<style>
  :root {
    --bg: #f6f5f2;
    --card-bg: #ffffff;
    --border: #ddd9d0;
    --text-primary: #1f1e1c;
    --text-secondary: #6b6a65;
    --accent: #b5541f;
    --accent2: #b5541f;
  }
  /* Spain: red & gold, from the national flag */
  body.lang-es { --accent: #AA151B; --accent2: #F1BF00; --border: #f0d9a8; }
  /* Slovenia: blue, white & red, from the national flag */
  body.lang-sl { --accent: #0033A0; --accent2: #ED1C24; --border: #b9c9e8; }
  /* China: red & gold, from the national flag */
  body.lang-zh { --accent: #DE2910; --accent2: #FFDE00; --border: #f3cf8a; }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    display: flex;
    justify-content: center;
    padding: 24px 16px 48px;
  }
  .app { width: 100%; max-width: 420px; }
  h1 { font-size: 18px; font-weight: 600; text-align: center; margin: 0 0 16px; }

  .lang-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .lang-toggle button {
    flex: 1;
    padding: 10px 4px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    background: var(--card-bg);
    color: var(--text-secondary);
    cursor: pointer;
  }
  .lang-toggle button.active { background: var(--accent); color: #fff; }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 10px;
  }
  .toolbar button {
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-primary);
    cursor: pointer;
  }
  .toolbar button:active { transform: scale(0.97); }

  .flag-stripe {
    height: 6px;
    border-radius: 3px;
    margin-bottom: 12px;
    display: flex;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .flag-stripe span { flex: 1; }
  body.lang-es .flag-stripe span:nth-child(1) { background: #AA151B; }
  body.lang-es .flag-stripe span:nth-child(2) { background: #F1BF00; flex: 2; }
  body.lang-es .flag-stripe span:nth-child(3) { background: #AA151B; }
  body.lang-sl .flag-stripe span:nth-child(1) { background: #ffffff; }
  body.lang-sl .flag-stripe span:nth-child(2) { background: #0033A0; }
  body.lang-sl .flag-stripe span:nth-child(3) { background: #ED1C24; }
  body.lang-zh .flag-stripe span:nth-child(1) { background: #DE2910; flex: 3; }
  body.lang-zh .flag-stripe span:nth-child(2) { background: #FFDE00; }
  body.lang-zh .flag-stripe span:nth-child(3) { background: #DE2910; flex: 3; }

  .card {
    position: relative;
    min-height: 220px;
    width: 100%;
    border: 1px solid var(--border);
    border-top: 4px solid var(--accent);
    border-radius: 14px;
    background: var(--card-bg);
    padding: 24px 22px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    margin-bottom: 16px;
  }
  .label {
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin: 0;
  }
  .word { font-size: 28px; font-weight: 600; margin: 0; color: var(--accent); }
  .pinyin { font-size: 15px; color: var(--text-secondary); margin: 0; font-style: italic; }
  .sub { font-size: 15px; color: var(--text-secondary); margin: 0; }
  .sentence { font-size: 17px; font-weight: 500; line-height: 1.5; margin: 4px 0 0; }
  .sentence-pinyin { font-size: 13px; color: var(--text-secondary); font-style: italic; margin: 2px 0 0; }

  .conj-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .conj-table td { padding: 5px 4px; }
  .conj-table td.pronoun { color: var(--text-secondary); width: 40%; }
  .conj-table td.form { font-weight: 600; }

  .controls { display: flex; gap: 8px; }
  .controls button {
    flex: 1;
    padding: 11px 4px;
    font-size: 13px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-primary);
    cursor: pointer;
  }
  .controls button:active { transform: scale(0.97); }
  .controls button.active-mode { background: var(--accent); color: #fff; border-color: var(--accent); }
  .controls button.hidden { display: none; }

  .nav-controls { display: flex; gap: 10px; margin-top: 10px; }
  .nav-controls button {
    flex: 1;
    padding: 12px;
    font-size: 15px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-primary);
    cursor: pointer;
  }
  .nav-controls button:active { transform: scale(0.97); }

  .hint { text-align: center; font-size: 12px; color: var(--text-secondary); margin-top: 14px; }
</style>
</head>

<div class="app">

  </div>

  <div class="nav-controls">
    <button id="prevBtn">Previous</button>
    <button id="nextBtn">Next</button>
  </div>

  <p class="hint">Switch between views above.</p>
</div>

  title: "100 Chinese Verbs", frontLabel: "动词", hasConj: false, hasPinyin: true,

["拿","ná","to take/hold","请帮我拿一下这个重箱子。","Qǐng bāng wǒ ná yíxià zhège zhòng xiāngzi.","Please help me carry this heavy box."],
["给","gěi","to give","叔叔给我们有用又诚实的建议。","Shūshu gěi wǒmen yǒuyòng yòu chéngshí de jiànyì.","Uncle gives us useful and honest advice."]

let currentLang = 'es';
let order = decks[currentLang].verbs.map((_, i) => i);
let idx = 0;
let mode = 'front'; // 'front' | 'back' | 'conj'

const cardEl = document.getElementById('card');
const counterEl = document.getElementById('counter');
const titleEl = document.getElementById('title');
const flipBtn = document.getElementById('flipBtn');
const transBtn = document.getElementById('transBtn');
const conjBtn = document.getElementById('conjBtn');

function render() {
  const deck = decks[currentLang];
  const v = deck.verbs[order[idx]];
  counterEl.textContent = (idx + 1) + ' / ' + deck.verbs.length;

  conjBtn.classList.toggle('hidden', !deck.hasConj);
  flipBtn.classList.toggle('active-mode', mode === 'front');
  transBtn.classList.toggle('active-mode', mode === 'back');
  conjBtn.classList.toggle('active-mode', mode === 'conj');

  if (mode === 'front') {
    if (deck.hasPinyin) {
      cardEl.innerHTML =
        '<p class="label">' + deck.frontLabel + '</p>' +
        '<p class="word">' + v[0] + '</p>' +
        '<p class="pinyin">' + v[1] + '</p>' +
        '<p class="sentence">' + v[3] + '</p>' +
        '<p class="sentence-pinyin">' + v[4] + '</p>';
    } else {
      cardEl.innerHTML =
        '<p class="label">' + deck.frontLabel + '</p>' +
        '<p class="word">' + v[0] + '</p>' +
        '<p class="sentence">' + v[2] + '</p>';
    }
  } else if (mode === 'back') {
    if (deck.hasPinyin) {
      cardEl.innerHTML =
        '<p class="label">Verb</p>' +
        '<p class="word">' + v[2] + '</p>' +
        '<p class="sentence">' + v[5] + '</p>';
    } else {
      cardEl.innerHTML =
        '<p class="label">Verb</p>' +
        '<p class="word">' + (v[0].charAt(0).toUpperCase() + v[0].slice(1)) + '</p>' +
        '<p class="sub">' + v[1] + '</p>' +
        '<p class="sentence">' + v[3] + '</p>';
    }
  } else {
    const pn = pronouns[currentLang];
    const forms = v[4];
    let rows = '';
    for (let i = 0; i < 6; i++) {
      rows += '<tr><td class="pronoun">' + pn[i] + '</td><td class="form">' + forms[i] + '</td></tr>';
    }
    cardEl.innerHTML =
      '<p class="label">' + v[0] + ' — present tense</p>' +
      '<table class="conj-table">' + rows + '</table>';
  }
}

function setLang(lang) {
  currentLang = lang;
  titleEl.textContent = decks[lang].title;
  order = decks[lang].verbs.map((_, i) => i);
  idx = 0;
  mode = 'front';
  document.getElementById('btnEs').classList.toggle('active', lang === 'es');
  document.getElementById('btnSl').classList.toggle('active', lang === 'sl');
  document.getElementById('btnZh').classList.toggle('active', lang === 'zh');
  document.body.classList.toggle('lang-es', lang === 'es');
  document.body.classList.toggle('lang-sl', lang === 'sl');
  document.body.classList.toggle('lang-zh', lang === 'zh');
  render();
}

function next() {
  idx = (idx + 1) % decks[currentLang].verbs.length;
  mode = 'front';
  render();
}

function prev() {
  idx = (idx - 1 + decks[currentLang].verbs.length) % decks[currentLang].verbs.length;
  mode = 'front';
  render();
}

function shuffle() {
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  idx = 0;
  mode = 'front';
  render();
}

cardEl.addEventListener('click', () => {
  const deck = decks[currentLang];
  if (deck.hasConj) {
    mode = mode === 'front' ? 'back' : mode === 'back' ? 'conj' : 'front';
  } else {
    mode = mode === 'front' ? 'back' : 'front';
  }
  render();
});
flipBtn.addEventListener('click', () => { mode = 'front'; render(); });
transBtn.addEventListener('click', () => { mode = 'back'; render(); });
conjBtn.addEventListener('click', () => { mode = 'conj'; render(); });
document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('prevBtn').addEventListener('click', prev);
document.getElementById('shuffleBtn').addEventListener('click', shuffle);
document.getElementById('btnEs').addEventListener('click', () => setLang('es'));
document.getElementById('btnSl').addEventListener('click', () => setLang('sl'));
document.getElementById('btnZh').addEventListener('click', () => setLang('zh'));

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
});

render();
</script>
