<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verb Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f5f2;
    --card-bg: #ffffff;
    --border: #ddd9d0;
    --text-primary: #1f1e1c;
    --text-secondary: #6b6a65;
    --accent: #b5541f;
    --accent2: #b5541f;
  }
  /* Spain: red & gold, from the national flag */
  body.lang-es { --accent: #AA151B; --accent2: #F1BF00; --border: #f0d9a8; }
  /* Slovenia: blue, white & red, from the national flag */
  body.lang-sl { --accent: #0033A0; --accent2: #ED1C24; --border: #b9c9e8; }
  /* China: red & gold, from the national flag */
  body.lang-zh { --accent: #DE2910; --accent2: #FFDE00; --border: #f3cf8a; }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    display: flex;
    justify-content: center;
    padding: 24px 16px 48px;
  }
  .app { width: 100%; max-width: 420px; }
  h1 { font-size: 18px; font-weight: 600; text-align: center; margin: 0 0 16px; }

  .lang-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .lang-toggle button {
    flex: 1;
    padding: 10px 4px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    background: var(--card-bg);
    color: var(--text-secondary);
    cursor: pointer;
  }
  .lang-toggle button.active { background: var(--accent); color: #fff; }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 10px;
  }
  .toolbar button {
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-primary);
    cursor: pointer;
  }
  .toolbar button:active { transform: scale(0.97); }

  .flag-stripe {
    height: 6px;
    border-radius: 3px;
    margin-bottom: 12px;
    display: flex;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .flag-stripe span { flex: 1; }
  body.lang-es .flag-stripe span:nth-child(1) { background: #AA151B; }
  body.lang-es .flag-stripe span:nth-child(2) { background: #F1BF00; flex: 2; }
  body.lang-es .flag-stripe span:nth-child(3) { background: #AA151B; }
  body.lang-sl .flag-stripe span:nth-child(1) { background: #ffffff; }
  body.lang-sl .flag-stripe span:nth-child(2) { background: #0033A0; }
  body.lang-sl .flag-stripe span:nth-child(3) { background: #ED1C24; }
  body.lang-zh .flag-stripe span:nth-child(1) { background: #DE2910; flex: 3; }
  body.lang-zh .flag-stripe span:nth-child(2) { background: #FFDE00; }
  body.lang-zh .flag-stripe span:nth-child(3) { background: #DE2910; flex: 3; }

  .card {
    position: relative;
    min-height: 220px;
    width: 100%;
    border: 1px solid var(--border);
    border-top: 4px solid var(--accent);
    border-radius: 14px;
    background: var(--card-bg);
    padding: 24px 22px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    margin-bottom: 16px;
  }
  .label {
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin: 0;
  }
  .word { font-size: 28px; font-weight: 600; margin: 0; color: var(--accent); }
  .pinyin { font-size: 15px; color: var(--text-secondary); margin: 0; font-style: italic; }
  .sub { font-size: 15px; color: var(--text-secondary); margin: 0; }
  .sentence { font-size: 17px; font-weight: 500; line-height: 1.5; margin: 4px 0 0; }
  .sentence-pinyin { font-size: 13px; color: var(--text-secondary); font-style: italic; margin: 2px 0 0; }
  .cjk { font-family: 'Noto Sans SC', sans-serif; }
  .quiz-grid { display: flex; gap: 10px; }
  .quiz-col { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .quiz-item {
    padding: 9px 6px;
    border: 1px solid transparent;
    border-radius: 8px;
    font-size: 13px;
    text-align: center;
    cursor: pointer;
    line-height: 1.3;
  }
  .quiz-item.quiz-left { background-color: #2B2A28; color: #F5F3EE; }
  .quiz-item.quiz-right { background-color: #F5F3EE; color: #2B2A28; border-color: var(--border); }
  .quiz-item.selected { background-color: var(--accent); color: #fff; }
  body.lang-es .quiz-item.selected { background-color: #F1BF00; color: #2B2A28; }
  body.lang-sl .quiz-item.selected { background-color: #0033A0; color: #fff; }
  body.lang-zh .quiz-item.selected { background-color: #DE2910; color: #fff; }
  .quiz-item.matched { background-color: #2F9E58; color: #ffffff; border-color: #2F9E58; cursor: default; }
  .quiz-item.wrong { border-color: #d32f2f; }
  .quiz-item:disabled { opacity: 1; -webkit-text-fill-color: currentColor; }
  .quiz-status { text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 12px; }
  .quiz-reset { text-align: center; margin-top: 8px; }
  .quiz-reset button {
    font-size: 12px; padding: 6px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--card-bg); color: var(--text-primary); cursor: pointer;
  }
  .radical-row {
    display: flex;
    gap: 10px;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .radical-row:last-child { border-bottom: none; }
  .radical-char { font-size: 22px; font-weight: 600; color: var(--accent); min-width: 32px; }
  .radical-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

  .conj-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .conj-table td { padding: 5px 4px; }
  .conj-table td.pronoun { color: var(--text-secondary); width: 40%; }
  .conj-table td.form { font-weight: 600; }

  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .controls button {
    padding: 11px 4px;
    font-size: 13px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-primary);
    cursor: pointer;
  }
  .controls button:active { transform: scale(0.97); }
  .controls button.active-mode { background: var(--accent); color: #fff; border-color: var(--accent); }
  .controls button.hidden { display: none; }

  .nav-controls { display: flex; gap: 10px; margin-top: 10px; }
  .nav-controls button {
    flex: 1;
    padding: 12px;
    font-size: 15px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-primary);
    cursor: pointer;
  }
  .nav-controls button:active { transform: scale(0.97); }

  .controls button.tab-complete:not(.active-mode) {
    background-color: #2F9E58;
    color: #ffffff;
    border-color: #2F9E58;
  }
  #quizBtn.tab-complete {
    background-color: #2F9E58;
    color: #ffffff;
    border-color: #2F9E58;
  }

  .lang-toggle button#btnStats { flex: 1.3; }

  .stats-table {
    max-height: 60vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card-bg);
  }
  .stats-row {
    display: grid;
    grid-template-columns: 20px 1.1fr 1.3fr 52px 52px;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .stats-row:last-child { border-bottom: none; }
  .stats-rank { color: var(--text-secondary); font-size: 12px; }
  .stats-word { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .stats-meaning { color: var(--text-secondary); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .stats-count {
    font-weight: 600;
    font-size: 12px;
    background: var(--accent);
    color: #fff;
    border-radius: 20px;
    padding: 3px 4px;
    text-align: center;
  }
  .stats-count-completed {
    font-weight: 600;
    font-size: 12px;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    border-radius: 20px;
    padding: 3px 4px;
    text-align: center;
  }
  .stats-count-completed.done {
    background: #2F9E58;
    color: #fff;
    border-color: #2F9E58;
  }
  .stats-row.stats-header {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--text-secondary);
    background: var(--bg);
    position: sticky;
    top: 0;
  }
  .stats-row.stats-header .stats-count,
  .stats-row.stats-header .stats-count-completed {
    background: transparent;
    color: var(--text-secondary);
    border: none;
    padding: 3px 4px;
    font-size: 10px;
    text-transform: uppercase;
  }

  .hint { text-align: center; font-size: 12px; color: var(--text-secondary); margin-top: 14px; }
</style>
</head>
<body class="lang-es">
<div class="app">
  <h1 id="title">100 Spanish Verbs</h1>

  <div class="lang-toggle">
    <button id="btnEs" class="active">Español</button>
    <button id="btnSl">Slovenščina</button>
    <button id="btnZh">中文</button>
    <button id="btnStats">📊 Stats</button>
  </div>

  <div id="flashcardView">
    <div class="toolbar">
      <span id="counter">1 / 100</span>
      <button id="shuffleBtn">Shuffle</button>
    </div>

    <div class="flag-stripe"><span></span><span></span><span></span></div>
    <div class="card" id="card"></div>

    <div class="controls">
      <button id="flipBtn" class="active-mode">Word / sentence</button>
      <button id="transBtn">English</button>
      <button id="conjBtn">Conjugation</button>
      <button id="quizBtn">Quiz</button>
    </div>

    <div class="nav-controls">
      <button id="prevBtn">Previous</button>
      <button id="nextBtn">Next</button>
    </div>

    <p class="hint">Switch between views above.</p>
  </div>

  <div id="statsView" style="display:none;">
    <div class="lang-toggle" id="statsLangToggle">
      <button id="statsBtnEs" class="active">Español</button>
      <button id="statsBtnSl">Slovenščina</button>
      <button id="statsBtnZh">中文</button>
    </div>
    <p class="hint" style="margin-top:0;">Sorted by how many times each verb has been viewed, most first.</p>
    <div id="statsTableWrap"></div>
  </div>
</div>

"破":{p:"pò",c:"石 (stone) + 皮 (skin/surface, sound component)",n:"石 \"stone\" marks characters about hard, breakable material — \"to break, destroy.\""},
"修":{p:"xiū",c:"亻(person) + 攸 (sound component) + 彡 (decorative strokes)",n:"亻 \"person\" plus decorative strokes 彡 suggest a person tidying or refining something — \"to repair, cultivate.\""},
"改":{p:"gǎi",c:"己 (self) + 攵 (action/strike)",n:"攵 marks an active motion — making a change happen to oneself or something. \"To change.\""},
"照":{p:"zhào",c:"灬(fire, four dots) + 昭 (bright, itself containing 日 sun)",n:"灬 \"fire\" at the bottom marks characters about light and illumination — \"to shine on,\" and by extension \"to look after (照顾).\""},
"保":{p:"bǎo",c:"亻(person) + a component originally showing a child on someone's back",n:"亻 \"person\" plus the carried-child image — a person looking after someone. \"To protect.\""},
"战":{p:"zhàn",c:"占 (sound component) + 戈 (spear/weapon)",n:"戈 \"weapon\" directly marks this as combat-related — \"to fight, battle.\""},
"赢":{p:"yíng",c:"combines 亡, 口, 月, 贝 (shell/money), and 凡",n:"The money radical 贝 sits inside this complex character, tying victory to gain — \"to win.\""},
"输":{p:"shū",c:"车 (cart/vehicle) + 俞 (sound component, \"to transport\")",n:"车 \"cart\" marks characters about transport — goods being carried away, extended to \"to lose (a game).\""},
"比":{p:"bǐ",c:"two 匕 (dagger-spoon shapes) side by side",n:"Two identical shapes placed next to each other for comparison — \"to compare, compete.\""},
"合":{p:"hé",c:"a lid over a container",n:"Pictures a lid fitting neatly over a container — things coming together. \"To combine, cooperate.\""},
"领":{p:"lǐng",c:"令 (command, sound component) + 页 (head/page)",n:"页 relates to the head and neck — as in leading someone by the collar. \"To lead.\""},
"跟":{p:"gēn",c:"足 (foot) + 艮 (sound component)",n:"足 \"foot\" marks this as a movement-related action — following on foot. \"To follow.\""},
"碰":{p:"pèng",c:"石 (stone) + 并 (sound component, \"together\")",n:"石 \"stone\" marks a hard, physical collision — \"to bump into, run into by chance.\""},
"拜":{p:"bài",c:"a hand component + 下 (down)",n:"Pictures hands lowering in a gesture of respect — \"to pay respects, visit.\""},
"庆":{p:"qìng",c:"traditionally 心 (heart) + 夂 (walk) under 广 (shelter)",n:"心 \"heart\" in the full form points to a joyful feeling — \"to celebrate.\""},
"出":{p:"chū",c:"a foot 止 emerging from an enclosure",n:"Pictures something stepping out of a confined space — \"to go out,\" and by extension \"to be born.\""},
"死":{p:"sǐ",c:"歹 (bad/bone fragment, death radical) + 匕 (a kneeling figure)",n:"歹 is the dedicated \"death/decay\" radical, appearing in words about death and illness. \"To die.\""},
"长":{p:"zhǎng",c:"pictograph of long hair on an elder with a staff",n:"An image of length and age — used both for \"long\" and, as a verb, \"to grow.\""},
"想":{p:"xiǎng",c:"相 (mutual, itself 木 wood + 目 eye) over 心 (heart)",n:"心 \"heart\" at the bottom marks this as a character of mental activity — \"to think.\""},
"决":{p:"jué",c:"冫(ice/water) + 夬 (sound component, \"to divide\")",n:"冫 relates to water — an old sense of \"breaching a dyke\" extended to \"resolving, deciding.\""},
"工":{p:"gōng",c:"pictograph of a carpenter's square",n:"A simple tool shape representing skilled labor and craftsmanship — \"work.\""},
"拿":{p:"ná",c:"合 (to combine) over 手 (hand)",n:"手 \"hand\" at the bottom directly shows the action of grasping — \"to take, hold.\""},
"给":{p:"gěi",c:"纟(silk/thread) + 合 (sound component, \"combine\")",n:"纟 \"thread\" originally related to supplying silk goods — broadened to \"to give, supply.\""},
"飞":{p:"fēi",c:"simplified pictograph of a bird's wings in motion",n:"The shape traces a bird spreading its wings — \"to fly.\""},
"游":{p:"yóu",c:"氵(water) + 斿 (a flowing banner, sound+meaning)",n:"氵 \"water\" marks this as a liquid-related action — moving through water, or more broadly wandering. \"To swim.\""},
"生":{p:"shēng",c:"pictograph of a plant sprouting from soil",n:"A stem pushing up out of the ground — new growth. \"To be born, to live, to grow.\""}
};

const PROGRESS_KEY = 'verbFlashcardsProgress_v1';

function loadProgress() {
  let data = null;
  try {
    const raw = localStorage.getItem(PROGRESS_KEY);
    if (raw) data = JSON.parse(raw);
  } catch (e) { /* localStorage unavailable, fall back to in-memory */ }
  if (!data) data = {};
  if (!data.es) data.es = {};
  if (!data.sl) data.sl = {};
  if (!data.zh) data.zh = {};
  if (!data.lastIndex) data.lastIndex = { es: 0, sl: 0, zh: 0 };
  return data;
}

function saveProgress() {
  try {
    localStorage.setItem(PROGRESS_KEY, JSON.stringify(progressData));
  } catch (e) { /* storage full or disabled — progress just won't persist */ }
}

function getEntry(lang, word) {
  if (!progressData[lang]) progressData[lang] = {};
  if (!progressData[lang][word]) {
    progressData[lang][word] = { front: false, back: false, extra: false, quiz: false, views: 0, completedReviews: 0 };
  }
  return progressData[lang][word];
}

function maybeCountCompletedReview(entry) {
  const wasFullyDone = entry._wasFullyDone;
  const isFullyDone = entry.front && entry.back && entry.extra && entry.quiz;
  if (isFullyDone && !wasFullyDone) {
    entry.completedReviews = (entry.completedReviews || 0) + 1;
    entry._justCompleted = true;
  }
  entry._wasFullyDone = isFullyDone;
}

function resetIfJustCompleted(lang, word) {
  const entry = getEntry(lang, word);
  if (entry._justCompleted) {
    entry.front = false;
    entry.back = false;
    entry.extra = false;
    entry.quiz = false;
    entry._wasFullyDone = false;
    entry._justCompleted = false;
    saveProgress();
  }
}

function markTabSeen(lang, word, tabKey) {
  const entry = getEntry(lang, word);
  if (!entry[tabKey]) {
    entry[tabKey] = true;
    maybeCountCompletedReview(entry);
    saveProgress();
  }
}

function recordView(lang, word) {
  const entry = getEntry(lang, word);
  entry.views = (entry.views || 0) + 1;
  saveProgress();
}

let progressData = loadProgress();

let currentLang = 'es';
let order = decks[currentLang].verbs.map((_, i) => i);
let idx = progressData.lastIndex[currentLang] || 0;
let mode = 'front'; // 'front' | 'back' | 'extra' | 'quiz'
let quizState = null;

const cardEl = document.getElementById('card');
const counterEl = document.getElementById('counter');
const titleEl = document.getElementById('title');
const flipBtn = document.getElementById('flipBtn');
const transBtn = document.getElementById('transBtn');
const conjBtn = document.getElementById('conjBtn');
const quizBtn = document.getElementById('quizBtn');

let viewMode = 'flashcards'; // 'flashcards' | 'stats'
let statsLang = 'es';

function saveLastPosition() {
  progressData.lastIndex[currentLang] = order[idx];
  saveProgress();
}

function buildQuiz() {
  const deck = decks[currentLang];
  const v = deck.verbs[order[idx]];
  let leftLabels, rightLabels, total;
  if (deck.extraMode === 'conj') {
    leftLabels = pronouns[currentLang].slice();
    rightLabels = v[4].slice();
    total = 6;
  } else {
    leftLabels = v[7].map(p => p[0]);
    rightLabels = v[7].map(p => p[1]);
    total = v[7].length;
  }
  let rightOrder = leftLabels.map((_, i) => i);
  for (let i = rightOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [rightOrder[i], rightOrder[j]] = [rightOrder[j], rightOrder[i]];
  }
  quizState = {
    leftLabels, rightLabels, rightOrder, total,
    matchedLeft: new Array(total).fill(false),
    matchedRightDisplay: new Array(total).fill(false),
    selectedLeftIdx: null,
    wrongFlashDisplayIdx: null,
    correctCount: 0
  };
}

function handleQuizClick(e) {
  const resetBtn = e.target.closest('.quiz-reset-btn');
  if (resetBtn) { buildQuiz(); render(); return; }
  if (!quizState) return;
  const leftBtn = e.target.closest('.quiz-left');
  const rightBtn = e.target.closest('.quiz-right');
  if (leftBtn) {
    const i = parseInt(leftBtn.dataset.idx, 10);
    if (quizState.matchedLeft[i]) return;
    quizState.selectedLeftIdx = i;
    quizState.wrongFlashDisplayIdx = null;
    render();
    return;
  }
  if (rightBtn) {
    const displayIdx = parseInt(rightBtn.dataset.display, 10);
    const origIdx = parseInt(rightBtn.dataset.orig, 10);
    if (quizState.matchedRightDisplay[displayIdx]) return;
    if (quizState.selectedLeftIdx === null) return;
    if (origIdx === quizState.selectedLeftIdx) {
      quizState.matchedLeft[quizState.selectedLeftIdx] = true;
      quizState.matchedRightDisplay[displayIdx] = true;
      quizState.correctCount++;
      quizState.selectedLeftIdx = null;
      if (quizState.correctCount === quizState.total) {
        const v = decks[currentLang].verbs[order[idx]];
        markTabSeen(currentLang, v[0], 'quiz');
      }
      render();
    } else {
      quizState.wrongFlashDisplayIdx = displayIdx;
      render();
      setTimeout(() => {
        if (!quizState) return;
        quizState.wrongFlashDisplayIdx = null;
        quizState.selectedLeftIdx = null;
        render();
      }, 500);
    }
  }
}

function render() {
  const deck = decks[currentLang];
  const v = deck.verbs[order[idx]];
  counterEl.textContent = (idx + 1) + ' / ' + deck.verbs.length;

  const entry = getEntry(currentLang, v[0]);
  if (mode === 'front') markTabSeen(currentLang, v[0], 'front');
  if (mode === 'back') markTabSeen(currentLang, v[0], 'back');
  if (mode === 'extra') markTabSeen(currentLang, v[0], 'extra');

  conjBtn.textContent = deck.extraLabel + (entry.extra ? ' ✓' : '');
  flipBtn.textContent = 'Word / sentence' + (entry.front ? ' ✓' : '');
  transBtn.textContent = 'English' + (entry.back ? ' ✓' : '');
  quizBtn.textContent = 'Quiz' + (entry.quiz ? ' ✓' : '');

  flipBtn.classList.toggle('active-mode', mode === 'front');
  transBtn.classList.toggle('active-mode', mode === 'back');
  conjBtn.classList.toggle('active-mode', mode === 'extra');
  quizBtn.classList.toggle('active-mode', mode === 'quiz');
  flipBtn.classList.toggle('tab-complete', entry.front);
  transBtn.classList.toggle('tab-complete', entry.back);
  conjBtn.classList.toggle('tab-complete', entry.extra);
  quizBtn.classList.toggle('tab-complete', entry.quiz);

  if (mode === 'front') {
    if (deck.hasPinyin) {
      cardEl.innerHTML =
        '<p class="label">' + deck.frontLabel + '</p>' +
        '<p class="word cjk">' + v[0] + '</p>' +
        '<p class="pinyin">' + v[1] + '</p>' +
        '<p class="sentence cjk">' + v[3] + '</p>' +
        '<p class="sentence-pinyin">' + v[4] + '</p>';
    } else {
      cardEl.innerHTML =
        '<p class="label">' + deck.frontLabel + '</p>' +
        '<p class="word">' + v[0] + '</p>' +
        '<p class="sentence">' + v[2] + '</p>';
    }
  } else if (mode === 'back') {
    if (deck.hasPinyin) {
      cardEl.innerHTML =
        '<p class="label">Verb</p>' +
        '<p class="word">' + v[2] + '</p>' +
        '<p class="sentence">' + v[5] + '</p>' +
        '<p class="sub" style="margin-top:8px;">Literally: <span class="cjk">' + v[6] + '</span></p>';
    } else {
      cardEl.innerHTML =
        '<p class="label">Verb</p>' +
        '<p class="word">' + (v[0].charAt(0).toUpperCase() + v[0].slice(1)) + '</p>' +
        '<p class="sub">' + v[1] + '</p>' +
        '<p class="sentence">' + v[3] + '</p>';
    }
  } else if (mode === 'extra' && deck.extraMode === 'conj') {
    const pn = pronouns[currentLang];
    const forms = v[4];
    let rows = '';
    for (let i = 0; i < 6; i++) {
      rows += '<tr><td class="pronoun">' + pn[i] + '</td><td class="form">' + forms[i] + '</td></tr>';
    }
    cardEl.innerHTML =
      '<p class="label">' + v[0] + ' — present tense</p>' +
      '<table class="conj-table">' + rows + '</table>';
  } else if (mode === 'extra' && deck.extraMode === 'radicals') {
    const mainChar = v[0].charAt(0);
    const info = charInfo[mainChar];
    if (info) {
      cardEl.innerHTML =
        '<p class="label">Character breakdown</p>' +
        '<div class="radical-row">' +
          '<span class="radical-char cjk">' + mainChar + '</span>' +
          '<span class="radical-desc"><strong>' + info.p + '</strong> — ' + info.c + '</span>' +
        '</div>' +
        '<p class="sentence" style="margin-top:10px;font-size:14px;font-weight:400;">' + info.n + '</p>';
    } else {
      cardEl.innerHTML =
        '<p class="label">Character breakdown</p>' +
        '<p class="sentence" style="font-size:14px;font-weight:400;">No breakdown available for this character yet.</p>';
    }
  } else if (mode === 'quiz') {
    if (!quizState) buildQuiz();
    const qs = quizState;
    const isZh = deck.hasPinyin;
    const leftHtml = qs.leftLabels.map((label, i) => {
      const cls = ['quiz-item', 'quiz-left'];
      if (qs.matchedLeft[i]) cls.push('matched');
      if (qs.selectedLeftIdx === i) cls.push('selected');
      if (isZh) cls.push('cjk');
      return '<button class="' + cls.join(' ') + '" data-idx="' + i + '"' + (qs.matchedLeft[i] ? ' disabled' : '') + '>' + label + '</button>';
    }).join('');
    const rightHtml = qs.rightOrder.map((origIdx, displayIdx) => {
      const cls = ['quiz-item', 'quiz-right'];
      if (qs.matchedRightDisplay[displayIdx]) cls.push('matched');
      if (qs.wrongFlashDisplayIdx === displayIdx) cls.push('wrong');
      return '<button class="' + cls.join(' ') + '" data-display="' + displayIdx + '" data-orig="' + origIdx + '"' + (qs.matchedRightDisplay[displayIdx] ? ' disabled' : '') + '>' + qs.rightLabels[origIdx] + '</button>';
    }).join('');
    const statusText = qs.correctCount === qs.total ? 'All matched! 🎉' : (qs.correctCount + ' / ' + qs.total + ' matched');
    const instructions = isZh ? 'Match each word to its meaning' : 'Match the pronoun to its verb form';
    cardEl.innerHTML =
      '<p class="label">' + instructions + '</p>' +
      '<div class="quiz-grid"><div class="quiz-col">' + leftHtml + '</div><div class="quiz-col">' + rightHtml + '</div></div>' +
      '<p class="quiz-status">' + statusText + '</p>' +
      '<div class="quiz-reset"><button class="quiz-reset-btn">Reshuffle</button></div>';
  }
}

function setLang(lang) {
  resetIfJustCompleted(currentLang, decks[currentLang].verbs[order[idx]][0]);
  currentLang = lang;
  titleEl.textContent = decks[lang].title;
  order = decks[lang].verbs.map((_, i) => i);
  idx = progressData.lastIndex[lang] || 0;
  mode = 'front';
  quizState = null;
  document.getElementById('btnEs').classList.toggle('active', lang === 'es');
  document.getElementById('btnSl').classList.toggle('active', lang === 'sl');
  document.getElementById('btnZh').classList.toggle('active', lang === 'zh');
  document.body.classList.toggle('lang-es', lang === 'es');
  document.body.classList.toggle('lang-sl', lang === 'sl');
  document.body.classList.toggle('lang-zh', lang === 'zh');
  recordView(currentLang, decks[currentLang].verbs[order[idx]][0]);
  saveLastPosition();
  render();
}

function next() {
  resetIfJustCompleted(currentLang, decks[currentLang].verbs[order[idx]][0]);
  idx = (idx + 1) % decks[currentLang].verbs.length;
  mode = 'front';
  quizState = null;
  recordView(currentLang, decks[currentLang].verbs[order[idx]][0]);
  saveLastPosition();
  render();
}

function prev() {
  resetIfJustCompleted(currentLang, decks[currentLang].verbs[order[idx]][0]);
  idx = (idx - 1 + decks[currentLang].verbs.length) % decks[currentLang].verbs.length;
  mode = 'front';
  quizState = null;
  recordView(currentLang, decks[currentLang].verbs[order[idx]][0]);
  saveLastPosition();
  render();
}

function shuffle() {
  resetIfJustCompleted(currentLang, decks[currentLang].verbs[order[idx]][0]);
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  idx = 0;
  mode = 'front';
  quizState = null;
  recordView(currentLang, decks[currentLang].verbs[order[idx]][0]);
  saveLastPosition();
  render();
}

cardEl.addEventListener('click', (e) => {
  if (mode === 'quiz') {
    handleQuizClick(e);
    return;
  }
  mode = mode === 'front' ? 'back' : mode === 'back' ? 'extra' : 'front';
  render();
});
flipBtn.addEventListener('click', () => { mode = 'front'; render(); });
transBtn.addEventListener('click', () => { mode = 'back'; render(); });
conjBtn.addEventListener('click', () => { mode = 'extra'; render(); });
quizBtn.addEventListener('click', () => { buildQuiz(); mode = 'quiz'; render(); });
document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('prevBtn').addEventListener('click', prev);
document.getElementById('shuffleBtn').addEventListener('click', shuffle);
document.getElementById('btnEs').addEventListener('click', () => { viewMode = 'flashcards'; setLang('es'); toggleView(); });
document.getElementById('btnSl').addEventListener('click', () => { viewMode = 'flashcards'; setLang('sl'); toggleView(); });
document.getElementById('btnZh').addEventListener('click', () => { viewMode = 'flashcards'; setLang('zh'); toggleView(); });

const flashcardViewEl = document.getElementById('flashcardView');
const statsViewEl = document.getElementById('statsView');
const statsTableWrap = document.getElementById('statsTableWrap');

function toggleView() {
  flashcardViewEl.style.display = viewMode === 'flashcards' ? '' : 'none';
  statsViewEl.style.display = viewMode === 'stats' ? '' : 'none';
  document.getElementById('btnStats').classList.toggle('active', viewMode === 'stats');
  if (viewMode === 'flashcards') {
    document.getElementById('btnEs').classList.toggle('active', currentLang === 'es');
    document.getElementById('btnSl').classList.toggle('active', currentLang === 'sl');
    document.getElementById('btnZh').classList.toggle('active', currentLang === 'zh');
  } else {
    document.getElementById('btnEs').classList.remove('active');
    document.getElementById('btnSl').classList.remove('active');
    document.getElementById('btnZh').classList.remove('active');
  }
}

function renderStats() {
  document.body.classList.toggle('lang-es', statsLang === 'es');
  document.body.classList.toggle('lang-sl', statsLang === 'sl');
  document.body.classList.toggle('lang-zh', statsLang === 'zh');
  document.getElementById('statsBtnEs').classList.toggle('active', statsLang === 'es');
  document.getElementById('statsBtnSl').classList.toggle('active', statsLang === 'sl');
  document.getElementById('statsBtnZh').classList.toggle('active', statsLang === 'zh');

  const deck = decks[statsLang];
  const isZh = deck.hasPinyin;
  const rows = deck.verbs.map(v => {
    const entry = getEntry(statsLang, v[0]);
    return { word: v[0], meaning: v[2], started: entry.views || 0, completed: entry.completedReviews || 0 };
  });
  rows.sort((a, b) => b.started - a.started);

  const totalStarted = rows.reduce((s, r) => s + r.started, 0);
  const totalCompleted = rows.reduce((s, r) => s + (r.completed > 0 ? 1 : 0), 0);

  const headerHtml =
    '<div class="stats-row stats-header">' +
      '<span class="stats-rank">#</span>' +
      '<span class="stats-word">Verb</span>' +
      '<span class="stats-meaning">Meaning</span>' +
      '<span class="stats-count">Started</span>' +
      '<span class="stats-count-completed">Reviewed</span>' +
    '</div>';

  const rowsHtml = rows.map((r, i) => {
    return '<div class="stats-row">' +
      '<span class="stats-rank">' + (i + 1) + '</span>' +
      '<span class="stats-word' + (isZh ? ' cjk' : '') + '">' + r.word + '</span>' +
      '<span class="stats-meaning">' + r.meaning + '</span>' +
      '<span class="stats-count">' + r.started + '</span>' +
      '<span class="stats-count-completed' + (r.completed > 0 ? ' done' : '') + '">' + r.completed + '</span>' +
    '</div>';
  }).join('');

  statsTableWrap.innerHTML =
    '<p class="hint" style="margin:0 0 10px;">' + totalStarted + ' cards started &nbsp;·&nbsp; ' + totalCompleted + ' / ' + rows.length + ' fully reviewed</p>' +
    '<div class="stats-table">' + headerHtml + rowsHtml + '</div>';
}

document.getElementById('btnStats').addEventListener('click', () => {
  viewMode = 'stats';
  toggleView();
  renderStats();
});
document.getElementById('statsBtnEs').addEventListener('click', () => { statsLang = 'es'; renderStats(); });
document.getElementById('statsBtnSl').addEventListener('click', () => { statsLang = 'sl'; renderStats(); });
document.getElementById('statsBtnZh').addEventListener('click', () => { statsLang = 'zh'; renderStats(); });

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
});

recordView(currentLang, decks[currentLang].verbs[order[idx]][0]);
render();
</script>
</body>
</html>
